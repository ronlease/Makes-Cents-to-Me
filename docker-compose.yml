services:
  postgres:
    container_name: makescents-postgres
    image: postgres:17
    environment:
      POSTGRES_DB: makescents
      POSTGRES_USER: makescents
      POSTGRES_PASSWORD: makescents_dev
    ports:
      - "5434:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
